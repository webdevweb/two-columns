<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Title</title>
    <style>
        /* Page */

        .page,
        .page__body {
            height: 100%;
        }

        .page {
            font-family: sans-serif;
        }

        .page__body {
            margin: auto;
            width: 800px;
            background-color: tomato;
        }

        /* News */

        .news--first {
            background-color: lightgreen;
        }

        .news--second {
            background-color: peachpuff;
        }

        /* News Title */

        .news__title {
            margin: 0;
            padding: 15px;
            font-weight: normal;
            font-size: 20px;
        }

        /* News Lead */

        .news__lead {
            margin: 0;
            padding: 15px;
            padding-top: 0;
            line-height: 1.4;
        }

        /* Columns */

        .columns {
            display: block;
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body class="page__body">
    <svg class="columns" viewBox="0 0 800 400" preserveAspectRatio="xMidYMin">
        <foreignObject x="0" y="0" width="390" height="100%">
            <article class="news news--first">
                <h2 class="news__title">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Amet blanditiis cupiditate
                    eos odio tenetur voluptatum!s</h2>
                <p class="news__lead">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Alias at commodi
                    consequuntur delectus eius expedita illum incidunt officiis sunt, voluptatum. A ab ad aliquid aspernatur
                    cupiditate debitis earum esse illum iure iusto necessitatibus nesciunt nobis non placeat porro,
                    praesentium provident qui quidem quisquam rerum saepe sequi soluta sunt ut voluptatem.</p>
            </article>
        </foreignObject>
        <foreignObject x="410" y="0" width="390" height="100%">
            <article class="news news--second">
                <h2 class="news__title">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Amet blanditiis cupiditate
                    eos odio tenetur voluptatum!</h2>
                <p class="news__lead">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Alias at commodi
                    consequuntur delectus eius expedita illum incidunt officiis sunt, voluptatum. A ab ad aliquid aspernatur
                    cupiditate debitis earum esse illum iure iusto necessitatibus nesciunt nobis non placeat porro,
                    praesentium provident qui quidem quisquam rerum saepe sequi soluta sunt ut voluptatem.</p>
            </article>
        </foreignObject>
    </svg>
</body>
</html>
